<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/000000/electronic-agreement.png" />
    <title>SI-KAJUR DKV: Administrasi Digital Siswa &amp; Surat</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker terdaftar di latar belakang.', reg.scope))
            .catch(err => console.log('Registrasi Service Worker gagal: ', err));
        });
      }
    </script>
  </body>
</html>
